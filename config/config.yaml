project:
  name: OncoLens
  seed: 42

dataset:
  path: /content/drive/MyDrive/LC25000/lung_colon_image_set
  image_size: 224
  val_size: 0.15
  test_size: 0.15
  num_workers: 2

model:
  backbone: resnet18
  pretrained: true

training:
  batch_size: 32
  epochs: 8
  learning_rate: 0.0003
  weight_decay: 0.0001
  output_dir: /content/drive/MyDrive/OncoLens/runs/exp1

storage:
  hf_repo_id: ""
  hf_token_env: HF_TOKEN

dashboard:
  sample_image_dir: /content/drive/MyDrive/LC25000/lung_colon_image_set
  metrics_path: /content/drive/MyDrive/OncoLens/runs/exp1/metrics.json

